<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Someone Special ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Arial', sans-serif;
}

body{
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ff9ecf,#ffc7de,#ffe8f1);
}

.container{
    background:rgba(255,255,255,0.9);
    padding:30px;
    border-radius:25px;
    text-align:center;
    width:90%;
    max-width:420px;
    box-shadow:0 0 25px rgba(255,105,180,0.4);
}

h1{
    color:#ff4d8d;
    margin-bottom:15px;
}

h2{
    color:#ff4d8d;
    margin:15px 0;
}

p{
    color:#555;
    margin:10px 0;
}

button{
    padding:12px 25px;
    border:none;
    border-radius:30px;
    font-size:18px;
    cursor:pointer;
    margin:10px;
}

#yes{
    background:#ff4d8d;
    color:white;
}

#no{
    background:#e0e0e0;
}

#message{
    display:none;
    color:#ff2f75;
    font-size:24px;
    margin-top:20px;
    font-weight:bold;
}

.floating{
    position:fixed;
    animation:fly 5s linear forwards;
    pointer-events:none;
}

@keyframes fly{
    0%{
        transform:translateY(0) rotate(0deg);
        opacity:1;
    }
    100%{
        transform:translateY(-120vh) rotate(360deg);
        opacity:0;
    }
}
</style>
</head>
<body>

<div class="container">
    <h1>❤️ Hey Beautiful ❤️</h1>
    <p>Kaise ho? 😊</p>
    <p>Mujhe tumse ek special baat puchni hai...</p>

    <h2>Will You Be Mine? 💖</h2>

    <button id="yes" onclick="acceptLove()">Yes ❤️</button>
    <button id="no" onclick="moveNo()">No 😅</button>

    <div id="message">
        💖 Yayyy! 💖<br>
        You Made My Day! 🥰🌹
    </div>
</div>

<script>
function moveNo(){
    let btn=document.getElementById("no");
    btn.style.position="absolute";
    btn.style.left=Math.random()*80+"%";
    btn.style.top=Math.random()*80+"%";
}

function acceptLove(){
    document.getElementById("message").style.display="block";

    for(let i=0;i<150;i++){
        setTimeout(()=>{
            createEffect();
        },i*50);
    }
}

function createEffect(){
    let item=document.createElement("div");

    let emojis=["❤️","💖","💕","💗","💘","🌹","✨"];
    item.innerHTML=emojis[Math.floor(Math.random()*emojis.length)];

    item.classList.add("floating");
    item.style.left=Math.random()*100+"vw";
    item.style.bottom="-20px";
    item.style.fontSize=(20+Math.random()*30)+"px";

    document.body.appendChild(item);

    setTimeout(()=>{
        item.remove();
    },5000);
}

setInterval(()=>{
    createEffect();
},700);
</script>

</body>
</html>
